name: Build macOS

on:
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-macos10.12
          - arch: arm64
            target: aarch64-apple-macos10.12
    runs-on: macos-latest
    env:
      VENDOR: ${{ github.workspace }}/vendor
      PREFIX: ${{ github.workspace }}/install
      MACOSX_DEPLOYMENT_TARGET: "10.12"

      OPUS_VERSION: 1.6.1
      OPUS_SHA256: 6ffcb593207be92584df15b32466ed64bbec99109f007c82205f0194572411a1

      LAME_VERSION: "3.100"
      LAME_SHA256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e

      X264_REVISION: b35605ace3ddf7c1a5d67a2eb553f034aef41d55
      LIBVPX_VERSION: v1.16.0
      SVTAV1_VERSION: v4.1.0
      OGG_VERSION: v1.3.6
      VORBIS_VERSION: v1.3.7
      NVCODEC_VERSION: n13.0.19.0
      VULKAN_VERSION: vulkan-sdk-1.4.341.0
      FFMPEG_VERSION: n8.1

      PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
      PKG_CONFIG: pkg-config --static

      CC: clang
      CXX: clang++
      CFLAGS: "-mmacosx-version-min=10.12 -fPIC"
      CXXFLAGS: "-mmacosx-version-min=10.12 -fPIC"
      LDFLAGS: "-mmacosx-version-min=10.12"

    steps:
      - name: Install build dependencies
        run: |
          brew install cmake ninja pkg-config libtool autoconf automake yasm nasm

      - name: Prepare build directories
        run: |
          mkdir -p "$VENDOR" "$PREFIX"

      - name: Build x264
        run: |
          git init "$VENDOR/x264"
          git -C "$VENDOR/x264" fetch https://code.videolan.org/videolan/x264.git "$X264_REVISION" --depth=1
          git -C "$VENDOR/x264" checkout FETCH_HEAD
          cd "$VENDOR/x264"

          ./configure \
            --prefix="$PREFIX" \
            --enable-static \
            --enable-pic \
            --disable-opencl \
            --disable-cli
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build libvpx
        run: |
          git init "$VENDOR/libvpx"
          git -C "$VENDOR/libvpx" fetch https://chromium.googlesource.com/webm/libvpx "$LIBVPX_VERSION" --depth=1
          git -C "$VENDOR/libvpx" checkout FETCH_HEAD
          cd "$VENDOR/libvpx"

          ./configure \
            --prefix="$PREFIX" \
            --enable-vp8 \
            --enable-vp9 \
            --enable-static \
            --enable-pic \
            --disable-examples \
            --disable-unit-tests \
            --target=${{ matrix.arch }}-darwin20
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build SVT-AV1
        run: |
          git init "$VENDOR/SVT-AV1"
          git -C "$VENDOR/SVT-AV1" fetch https://gitlab.com/AOMediaCodec/SVT-AV1 "$SVTAV1_VERSION" --depth=1
          git -C "$VENDOR/SVT-AV1" checkout FETCH_HEAD
          cd "$VENDOR/SVT-AV1"

          cmake -S . -B build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.12" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}" \
            -DNATIVE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build

      - name: Build LAME
        run: |
          if [ ! -f "$VENDOR/lame-${LAME_VERSION}.tar.gz" ]; then
            curl --output-dir "$VENDOR" -LO https://deac-ams.dl.sourceforge.net/project/lame/lame/${LAME_VERSION}/lame-${LAME_VERSION}.tar.gz
          fi

          tar xf "$VENDOR/lame-${LAME_VERSION}.tar.gz" -C "$VENDOR"
          cd "$VENDOR/lame-${LAME_VERSION}"

          ./configure \
            --prefix="$PREFIX" \
            --enable-static \
            --enable-pic \
            --disable-shared
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build OPUS
        run: |
          if [ ! -f "$VENDOR/opus-${OPUS_VERSION}.tar.gz" ]; then
            curl --output-dir "$VENDOR" -LO https://downloads.xiph.org/releases/opus/opus-${OPUS_VERSION}.tar.gz
          fi

          tar xf "$VENDOR/opus-${OPUS_VERSION}.tar.gz" -C "$VENDOR"
          cd "$VENDOR/opus-${OPUS_VERSION}"

          ./configure \
            --prefix="$PREFIX" \
            --enable-custom-modes \
            --enable-static \
            --enable-pic \
            --disable-shared
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build OGG
        run: |
          git init "$VENDOR/ogg"
          git -C "$VENDOR/ogg" fetch https://github.com/xiph/ogg.git "$OGG_VERSION" --depth=1
          git -C "$VENDOR/ogg" checkout FETCH_HEAD
          cd "$VENDOR/ogg"

          cmake -S . -B build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.12" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build

      - name: Build Vorbis
        run: |
          git init "$VENDOR/vorbis"
          git -C "$VENDOR/vorbis" fetch https://github.com/xiph/vorbis.git "$VORBIS_VERSION" --depth=1
          git -C "$VENDOR/vorbis" checkout FETCH_HEAD
          cd "$VENDOR/vorbis"

          ./autogen.sh
          ./configure \
            --prefix="$PREFIX" \
            --enable-static \
            --enable-pic \
            --disable-shared
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Install ffnvcodec-headers
        run: |
          git init "$VENDOR/ffnvcodec-headers"
          git -C "$VENDOR/ffnvcodec-headers" fetch https://git.videolan.org/git/ffmpeg/nv-codec-headers.git "$NVCODEC_VERSION" --depth=1
          git -C "$VENDOR/ffnvcodec-headers" checkout FETCH_HEAD
          cd "$VENDOR/ffnvcodec-headers"

          make PREFIX="$PREFIX"
          make PREFIX="$PREFIX" install

      - name: Install vulkan-headers
        run: |
          git init "$VENDOR/vulkan-headers"
          git -C "$VENDOR/vulkan-headers" fetch https://github.com/KhronosGroup/Vulkan-Headers.git "$VULKAN_VERSION" --depth=1
          git -C "$VENDOR/vulkan-headers" checkout FETCH_HEAD
          cd "$VENDOR/vulkan-headers"

          cmake -S . -B build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.12" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cmake --install build

      - name: Build FFmpeg
        run: |
          git init "$VENDOR/ffmpeg"
          git -C "$VENDOR/ffmpeg" fetch https://git.ffmpeg.org/ffmpeg.git "$FFMPEG_VERSION" --depth=1
          git -C "$VENDOR/ffmpeg" checkout FETCH_HEAD
          cd "$VENDOR/ffmpeg"

          ./configure \
            --prefix="$PREFIX" \
            --disable-autodetect \
            --disable-everything \
            --enable-gpl \
            --enable-muxer=mp4 \
            --enable-muxer=matroska \
            --enable-muxer=mov \
            --enable-muxer=webm \
            --enable-libx264 \
            --enable-encoder=libx264 \
            --enable-encoder=libx264rgb \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-libvpx \
            --enable-encoder=libvpx_vp8 \
            --enable-parser=vp8 \
            --enable-encoder=libvpx_vp9 \
            --enable-parser=vp9 \
            --enable-libsvtav1 \
            --enable-encoder=libsvtav1 \
            --enable-parser=av1 \
            --enable-libmp3lame \
            --enable-encoder=aac \
            --enable-encoder=libmp3lame \
            --enable-parser=aac \
            --enable-parser=mpegaudio \
            --enable-encoder=flac \
            --enable-parser=flac \
            --enable-libopus \
            --enable-encoder=libopus \
            --enable-parser=opus \
            --enable-libvorbis \
            --enable-encoder=libvorbis \
            --enable-parser=vorbis \
            --enable-decoder=rawvideo \
            --enable-demuxer=rawvideo \
            --enable-decoder=pcm_s16le \
            --enable-demuxer=pcm_s16le \
            --enable-bsf=h264_mp4toannexb \
            --enable-bsf=aac_adtstoasc \
            --enable-filter=format \
            --enable-filter=hwupload \
            --enable-filter=scale \
            --enable-protocol=pipe \
            --enable-protocol=file \
            --enable-pthreads \
            --enable-ffnvcodec \
            --enable-vulkan \
            --enable-ffmpeg \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swscale-alpha \
            --enable-swresample \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-debug \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages \
            --enable-pic \
            --enable-static \
            --disable-shared \
            --disable-asm \
            --pkg-config-flags="--static" \
            --extra-cflags="-I$PREFIX/include -fPIC -mmacosx-version-min=10.12" \
            --extra-ldflags="-L$PREFIX/lib -mmacosx-version-min=10.12" \
            --extra-libs="-lm -lpthread"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Create libffmpeg.dylib shim (optional - for app deployment without duplicating libraries)
        run: |
          cd "$PREFIX/lib"
          ld -dylib -lSystem \
            -force_load libavformat.a \
            -force_load libavcodec.a \
            -force_load libavutil.a \
            -force_load libswresample.a \
            -force_load libswscale.a \
            -force_load libx264.a \
            -force_load libvpx.a \
            -force_load libSvtAv1Enc.a \
            -force_load libopus.a \
            -force_load libvorbis.a \
            -force_load libvorbisenc.a \
            -force_load libvorbisfile.a \
            -force_load libogg.a \
            -force_load libmp3lame.a \
            -o libffmpeg.dylib
          install_name_tool -id "@loader_path/libffmpeg.dylib" libffmpeg.dylib

      - name: Create archive
        run: |
          mkdir -p package
          cd package

          cp "$PREFIX/bin/ffmpeg" .
          cp "$PREFIX/lib/libffmpeg.dylib" .
          zip -r "ffmpeg-macos-${{ matrix.arch }}.zip" ffmpeg libffmpeg.dylib

          md5 ffmpeg
          md5 libffmpeg.dylib
          md5 "ffmpeg-macos-${{ matrix.arch }}.zip"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          path: package/ffmpeg-macos-${{ matrix.arch }}.zip
          archive: false
